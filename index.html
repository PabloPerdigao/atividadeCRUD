<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/img/netuno.png" />
    <title>Registro Netuno</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <main class="container py-5">
      <h2 class="text-center mb-4">Portal Q2 Netuno</h2>

        <!-- Forms cadastro -->
        <section class="card shadow-sm mb-5 mx-auto" style="max-width: 600px">
          <hgroup class="card-header bg-primary text-white">
            <h5 class="mb-0">Novo Integrante</h5>
          </hgroup>
          <div class="card-body text-center">
            <form id="form-integrante">
              <fieldset class="mb-3">
                <input
                  type="text"
                  id="nome"
                  class="form-control"
                  placeholder="Nome Completo"
                  required
                />
              </fieldset>
              <fieldset class="mb-3">
                <input
                  type="email"
                  id="email"
                  class="form-control"
                  placeholder="E-mail"
                  required
                />
              </fieldset>
              <fieldset class="mb-3">
                <input
                  type="text"
                  id="github"
                  class="form-control"
                  placeholder="URL do GitHub"
                  required
                />
              </fieldset>
              <fieldset class="mb-3">
                <input
                  type="text"
                  id="linkedin"
                  class="form-control"
                  placeholder="URL do LinkedIn"
                  required
                />
              </fieldset>
              <button type="submit" class="btn btn-success w-100 fw-bold mb-3">
                Cadastrar Integrante
              </button>
            </form>
            <span id="mensagem" class="mt-3 text-center fw-bold"></span>
          </div>
        </section>
  
        <!-- Tabela de Integrantes -->
        <section class="card shadow-sm">
          <hgroup class="card-header bg-dark text-white">
            <h5 class="mb-0"> Lista de Integrantes</h5>
          </hgroup>
          <div class="card-body table-responsive">
            <table class="table table-hover align-middle" id="tabela-integrantes">
              <thead class="table-light">
                <tr>
                  <th>ID</th>
                  <th>Nome</th>
                  <th>E-mail</th>
                  <th>GitHub</th>
                  <th>LinkedIn</th>
                  <th class="text-center">Ações</th>
                </tr>
              </thead>
              <tbody>
  
              </tbody>
            </table>
          </div>
        </section>
      
    </main>

    <!-- MODAL -->
    <section class="modal fade" id="modalEdicao" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header bg-warning">
            <h5 class="modal-title fw-bold">Editar Integrante</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form id="form-edicao">
              <input type="hidden" id="edit-id" />

              <div class="mb-3">
                <label class="form-label">Nome Completo</label>
                <input
                  type="text"
                  id="edit-nome"
                  class="form-control"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">E-mail</label>
                <input
                  type="email"
                  id="edit-email"
                  class="form-control"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">GitHub</label>
                <input
                  type="text"
                  id="edit-github"
                  class="form-control"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">LinkedIn</label>
                <input
                  type="text"
                  id="edit-linkedin"
                  class="form-control"
                  required
                />
              </div>
              <div class="text-end">
                <button
                  type="button"
                  class="btn btn-secondary"
                  data-bs-dismiss="modal"
                >
                  Cancelar
                </button>
                <button type="submit" class="btn btn-primary">
                  Salvar Alterações
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
